<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="character introduction">
    <meta property="og:description" content="character introductionでは各sectionにおける弾幕の情報を知ることができます。">
    <meta property="og:image" content="https://yzy-nn.github.io/i-wanna-prima/imgs/og_image.png">
    <meta property="og:url" content="https://yzy-nn.github.io/i-wanna-prima/character_introduction.html">
    <title>character introduction</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            display: flex;
            overflow: hidden;
        }

        .accordion {
            width: 22vh;
            height: 100vh;
            overflow-y: scroll;
            overflow-x: hidden;
            box-shadow: 2px 0 5px rgba(0, 0, 0, 0.1);
            border-right: 1px solid #ddd;
            background-color: #fff;
            display: flex;
            flex-direction: column;
        }

        .accordion h1 {
            text-align: center;
            margin: 20px 0;
            color: #333;
            font-size: 1.5em;
        }

        .accordion-item {
            border-bottom: 1px solid #ddd;
            flex-shrink: 0;
        }

        .accordion-title {
            background-color: #2c3e50;
            color: white;
            padding: 15px;
            font-size: 16px;
            line-height: 1.3;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.3s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .accordion-title:hover {
            background-color: #34495e;
        }

        .accordion-content {
            display: none;
            padding: 0 20px;
            line-height: 1.3;
            animation: fadeIn 0.5s;
        }

        .accordion-content.active {
            display: block;
        }

        .section-link {
            display: block;
            padding: 10px 0;
            color: #3498db;
            text-decoration: none;
            transition: color 0.3s ease;
            line-height: 1.6;
        }

        .section-link:hover:not(.disabled) {
            color: #1abc9c;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translate(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .arrow {
            transition: transform 0.3s ease;
        }

        .accordion-title.open .arrow {
            transform: rotate(90deg);
        }

        .content-display {
            margin-left: 20px;
            padding: 20px;
            flex: 1;
            overflow-y: auto;
            transition: margin-left 0.3s;
        }

        .content-display h2 {
            color: #333;
            border-bottom: 2px solid #ddd;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .content-display p {
            line-height: 1.6;
            color: #555;
        }
    </style>
</head>
<body>

    <div class="accordion" id="accordion"></div>

    <div class="content-display" id="contentDisplay"></div>

    <script>
        const chapters = [
            { title: "chapter1", sections: 2 },
            { title: "chapter2", sections: 6 },
            { title: "chapter3", sections: 4 },
            { title: "chapter4", sections: 9 },
            { title: "chapter5", sections: 2 },
            { title: "chapter6", sections: 6 },
            { title: "chapter7", sections: 4 },
            { title: "chapter8", sections: 8 },
            { title: "chapter9", sections: 4 },
            { title: "chapter10", sections: 4 },
            { title: "chapter11", sections: 9 },
            { title: "chapter12", sections: 3 },
        ];

        function createAccordion(chapters) {
            const accordionContainer = document.getElementById('accordion');

            chapters.forEach((chapter, chapterIndex) => {
                const chapterDiv = document.createElement('div');
                chapterDiv.classList.add('accordion-item');

                const chapterTitle = document.createElement('div');
                chapterTitle.classList.add('accordion-title');
                chapterTitle.innerHTML = `
                    ${chapter.title}
                    <span class="arrow">▶</span>
                `;

                chapterDiv.appendChild(chapterTitle);

                const chapterContent = document.createElement('div');
                chapterContent.classList.add('accordion-content');

                for (let i = 1; i <= chapter.sections; i++) {
                    const sectionLink = document.createElement('a');
                    sectionLink.classList.add('section-link');
                    const path = `./chapter${chapterIndex + 1}-section${i}.html`;
                    sectionLink.href = path;
                    sectionLink.textContent = `section${i}`;

                    sectionLink.addEventListener('click', function(event) {
                        if (!sectionLink.classList.contains('disabled')) {
                            event.preventDefault();
                            loadContent(this.href);
                        }
                    });

                    chapterContent.appendChild(sectionLink);
                }

                chapterDiv.appendChild(chapterContent);
                accordionContainer.appendChild(chapterDiv);

                chapterTitle.addEventListener('click', () => {
                    const isActive = chapterContent.classList.contains('active');

                    document.querySelectorAll('.accordion-content').forEach(content => {
                        content.classList.remove('active');
                        content.previousElementSibling.classList.remove('open');
                    });

                    if (!isActive) {
                        chapterContent.classList.add('active');
                        chapterTitle.classList.add('open');
                    }
                });

                if (chapterIndex === 0) {
                    chapterContent.classList.add('active');
                    chapterTitle.classList.add('open');
                }
            });
        }

        function loadContent(url) {
            const contentDisplay = document.getElementById('contentDisplay');
            contentDisplay.innerHTML = `<iframe src="${url}" style="transform: scale(1); transform-origin: top center; width: 100%; height: 95vh; border: none; overflow: hidden; scale: 1;"></iframe>`;
        }

        createAccordion(chapters);
        loadContent('./chapter1-section1.html');
    </script>
</body>
</html>
